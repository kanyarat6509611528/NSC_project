{% extends 'app_general/components/base.html' %}
{% load static %}
{% block content %}
<div class="page-style">
    <div class="frame-big">
      {% if validlink %}
      <h3>ตั้งรหัสผ่านใหม่</h3>
      <form method="POST">
        {% csrf_token %}
        <div style="text-align: left;">
          {{ form.as_p }}
        </div>
        <br>
      <button class="button-next" type="submit">ยืนยัน</button>
      </form>
    {% else %}
      <div style="margin:5%;">
        <h3>ลิงก์ไม่สามารถใช้งานได้</h3>
        <p>อาจเป็นเพราะลิงก์หมดอายุ หรือเคยใช้งานลิงก์นี้ไปแล้ว</p>
        <br>
        <a href="{% url 'home' %}">
          <button class="button-next" type="button">กลับหน้าแรก</button>
        </a>
      </div>
    {% endif %}
    </div>
</div>

<style>
    .page-style {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 5%;
        color: white;
    }
    .frame-big {
        width: 40%;
    }
    .page-context {
        margin: 40px 80px;
    }
    .form-field {
        margin-bottom: 15px;
        text-align: left;
    }
    .form-field label {
        display: block;
        color: white;
        margin-bottom: 5px;
    }
    .form-field input {
        width: 100%;
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    .text-group {
        display: flex;
        justify-content: center;
        margin-top: 15px;
    }
    .text-group p {
        margin: 0;
        margin-right: 5px;
    }
    .text-group a {
        color: #c6a44e;
    }

</style>
{% endblock %}
