{% extends 'app_users/components/profile_base.html' %}
{% load static %}
{% block content-profile %}

<div class="frame-small" style="display: flex; flex-direction: column; align-items: center;">
  <h4 style="margin-bottom: 5%;">เปลี่ยนรหัสผ่าน</h4>

  <form action="{% url 'password_change' %}" method="POST">
    <div style="text-align: left;">
      {% csrf_token %}
      {{ form.non_field_errors }}
      {{ form.as_p }}
    </div>
    <button class="button-next" type="submit">บันทึก</button>
  </form>
</div>

{% endblock %}
